<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>MauiBlazorDelivery</title>
    <link rel="icon" href="data:," />
    <base href="/" />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <!-- Capa de fondo fija (nuevo) -->
    <div class="app-bg"></div>
    <!-- (opcional) overlay para mejorar contraste -->
    <!-- <div class="bg-overlay"></div> -->

    <div id="app">Cargando...</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        window.mauiPrintHelper = {
            printWithClass: async function (elementId) {
                const el = document.getElementById(elementId);
                if (!el) return null;
                const opt = {
                    margin: 10,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                const dataUri = await html2pdf().set(opt).from(el).output('datauristring');
                return dataUri;
            }
        };
    </script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
</body>

</html>
